<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma de Cuotas | MiBanco Perú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/mibanco.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="main-content">
    <a href="/prestamos" class="btn btn-outline-secondary mb-3" style="border-radius:20px;">
        <i class="bi bi-arrow-left me-1"></i>Volver a Préstamos
    </a>
    <h4 style="font-weight:800; color:#006633;" class="mb-4"><i class="bi bi-list-ol me-2"></i>Cronograma de Pagos</h4>
    <div class="mb-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>N° Cuota</th><th>Fecha Pago</th><th>Capital</th><th>Interés</th>
                        <th>Seguro</th><th>Total</th><th>Saldo Capital</th><th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${cuotas}"
                    th:classappend="${c.estado.name() == 'PAGADA' ? 'table-success' : (c.estado.name() == 'MOROSA' ? 'table-danger' : '')}">
                    <td class="fw-bold" th:text="${c.numeroCuota}">0</td>
                    <td th:text="${c.fechaPagoProgramada}">-</td>
                    <td th:text="${'S/ ' + #numbers.formatDecimal(c.capital, 1, 'COMMA', 2, 'POINT')}">0</td>
                    <td th:text="${'S/ ' + #numbers.formatDecimal(c.interes, 1, 'COMMA', 2, 'POINT')}">0</td>
                    <td th:text="${'S/ ' + #numbers.formatDecimal(c.seguro, 1, 'COMMA', 2, 'POINT')}">0</td>
                    <td class="fw-bold" th:text="${'S/ ' + #numbers.formatDecimal(c.montoTotal, 1, 'COMMA', 2, 'POINT')}">0</td>
                    <td th:text="${'S/ ' + #numbers.formatDecimal(c.saldoCapital, 1, 'COMMA', 2, 'POINT')}">0</td>
                    <td>
                        <span class="badge"
                              th:classappend="${c.estado.name() == 'PAGADA' ? 'bg-success' : (c.estado.name() == 'MOROSA' ? 'bg-danger' : 'bg-secondary')}"
                              th:text="${c.estado.name()}">ESTADO</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
