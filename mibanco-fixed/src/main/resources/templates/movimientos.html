<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos | MiBanco Perú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/mibanco.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="main-content">
    <h4 style="font-weight:800; color:#006633;" class="mb-4"><i class="bi bi-clock-history me-2"></i>Historial de Movimientos</h4>
    <div class="mb-card">
        <div th:if="${movimientos != null and !movimientos.isEmpty()}">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr><th>Fecha</th><th>Hora</th><th>Tipo</th><th>Descripción</th><th>Origen</th><th>Destino</th><th>Canal</th><th class="text-end">Monto</th><th>Ref.</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="tx : ${movimientos}">
                        <td style="font-size:0.83rem;" th:text="${tx.fecha}">-</td>
                        <td style="font-size:0.83rem;" th:text="${tx.hora}">-</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${tx.tipo.name() == 'DEPOSITO' ? 'bg-success' :
                                                  (tx.tipo.name() == 'RETIRO' ? 'bg-danger' :
                                                  (tx.tipo.name() == 'TRANSFERENCIA' ? 'bg-primary' :
                                                  (tx.tipo.name() == 'YAPA' ? 'bg-purple' : 'bg-secondary')))}"
                                  th:text="${tx.tipo.name()}">TIPO</span>
                        </td>
                        <td style="font-size:0.83rem;" th:text="${tx.descripcion}">-</td>
                        <td style="font-size:0.8rem;" th:text="${tx.cuentaOrigen?.numeroCuenta ?: '-'}">-</td>
                        <td style="font-size:0.8rem;" th:text="${tx.cuentaDestino?.numeroCuenta ?: '-'}">-</td>
                        <td style="font-size:0.8rem;" th:text="${tx.canal}">-</td>
                        <td class="text-end fw-bold"
                            th:classappend="${tx.tipo.name() == 'DEPOSITO' ? 'text-success' : 'text-danger'}"
                            th:text="${(tx.tipo.name() == 'DEPOSITO' ? '+' : '-') + 'S/ ' + #numbers.formatDecimal(tx.monto, 1, 'COMMA', 2, 'POINT')}">0</td>
                        <td><small class="text-muted" th:text="${tx.referencia}">-</small></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:if="${movimientos == null or movimientos.isEmpty()}" class="text-center text-muted py-5">
            <i class="bi bi-inbox" style="font-size:3rem; color:#ccc;"></i>
            <p class="mt-3">No hay movimientos registrados.</p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
