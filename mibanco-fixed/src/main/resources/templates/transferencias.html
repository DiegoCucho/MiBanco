<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferencias | MiBanco Perú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/mibanco.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="main-content">

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h4 style="font-weight:800; color:#006633;" class="mb-4"><i class="bi bi-send me-2"></i>Transferencias</h4>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="mb-card">
                <div class="mb-card-header"><h5><i class="bi bi-send me-2 text-green"></i>Nueva Transferencia</h5></div>
                <form th:action="@{/transferencias/realizar}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Número de cuenta destino</label>
                        <input type="text" class="form-control" name="numeroCuentaDest" placeholder="19000012345678" required>
                        <small class="text-muted">Ingresa el número de cuenta de 14 dígitos</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Monto (S/)</label>
                        <input type="number" class="form-control" name="monto" min="1" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción (opcional)</label>
                        <input type="text" class="form-control" name="descripcion" placeholder="Motivo de la transferencia">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tu cuenta origen</label>
                        <select class="form-select" disabled>
                            <option th:each="c : ${cuentas}" th:value="${c.id}"
                                    th:text="${c.producto + ' — ' + c.numeroCuenta + ' — S/ ' + c.saldo}">Cuenta</option>
                        </select>
                        <small class="text-muted">Se usará tu primera cuenta en soles activa</small>
                    </div>
                    <button type="submit" class="btn btn-success w-100" style="border-radius:50px; font-weight:700;">
                        <i class="bi bi-send me-2"></i>Realizar Transferencia
                    </button>
                </form>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="mb-card">
                <div class="mb-card-header"><h5><i class="bi bi-clock-history me-2 text-green"></i>Transferencias Recientes</h5></div>
                <div th:if="${movimientos != null and !movimientos.isEmpty()}">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead><tr><th>Fecha</th><th>Destino</th><th>Descripción</th><th class="text-end">Monto</th><th>Ref.</th></tr></thead>
                            <tbody>
                            <tr th:each="tx : ${movimientos}">
                                <td style="font-size:0.83rem;" th:text="${tx.fecha}">-</td>
                                <td style="font-size:0.83rem;" th:text="${tx.cuentaDestino?.numeroCuenta ?: 'Externa'}">-</td>
                                <td style="font-size:0.83rem;" th:text="${tx.descripcion}">-</td>
                                <td class="text-end fw-bold text-danger" th:text="${'-S/ ' + #numbers.formatDecimal(tx.monto, 1, 'COMMA', 2, 'POINT')}">0</td>
                                <td><small class="text-muted" th:text="${tx.referencia}">-</small></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div th:if="${movimientos == null or movimientos.isEmpty()}" class="text-center text-muted py-4">
                    <i class="bi bi-inbox" style="font-size:2rem; color:#ccc;"></i>
                    <p class="mt-2">No hay transferencias recientes.</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
