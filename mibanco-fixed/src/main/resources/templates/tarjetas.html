<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjetas | MiBanco Perú</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link th:href="@{/css/mibanco.css}" rel="stylesheet">
    <style>
        .tarjeta-debito  { background: linear-gradient(135deg, #006633 0%, #00a651 100%); }
        .tarjeta-credito { background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%); }
    </style>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="main-content">
    <h4 style="font-weight:800; color:#006633;" class="mb-4"><i class="bi bi-credit-card me-2"></i>Mis Tarjetas</h4>

    <div th:if="${tarjetas != null and !tarjetas.isEmpty()}">
        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="t : ${tarjetas}">
                <div th:class="${'tarjeta-' + t.tipo.name().toLowerCase()}"
                     style="border-radius:20px; padding:1.6rem; min-height:180px; position:relative; overflow:hidden; color:#fff; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
                    <div style="font-size:0.72rem; opacity:0.75; text-transform:uppercase; letter-spacing:2px; margin-bottom:0.8rem;"
                         th:text="${'Tarjeta ' + t.tipo.name()}">TIPO</div>
                    <div style="width:42px; height:32px; border-radius:6px; background:linear-gradient(135deg,#F5C518,#d4a914); margin-bottom:0.8rem;"></div>
                    <div style="font-family:monospace; font-size:1.05rem; letter-spacing:3px; margin-bottom:0.8rem;"
                         th:text="${t.numeroEnmascarado}">**** **** **** ****</div>
                    <div style="font-size:0.75rem; opacity:0.75;">
                        Vence: <span th:text="${t.fechaVencimiento}">-</span>
                    </div>
                    <div style="position:absolute; bottom:1.2rem; right:1.4rem; font-size:1.4rem; font-weight:900; font-style:italic; opacity:0.9;">VISA</div>
                    <div style="position:absolute; top:1rem; right:1rem;">
                        <span class="badge"
                              th:classappend="${t.estado.name() == 'ACTIVA' ? 'bg-success' : 'bg-danger'}"
                              th:text="${t.estado.name()}">ACTIVA</span>
                    </div>
                </div>
                <div class="mt-2 text-center" style="font-size:0.8rem; color:#888;">
                    Cuenta asociada: <span class="fw-bold" th:text="${t.cuenta.numeroCuenta}">-</span>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${tarjetas == null or tarjetas.isEmpty()}" class="text-center text-muted py-5">
        <i class="bi bi-credit-card" style="font-size:3rem; color:#ccc;"></i>
        <p class="mt-3">No tienes tarjetas activas.</p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
