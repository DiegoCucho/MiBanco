# ============================================================
# MiBanco Perú - Configuración de Aplicación
# ============================================================
spring.application.name=MiBanco Perú

# --- Base de Datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/banco?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# --- Server ---
server.port=8080

# --- Zona horaria ---
spring.jackson.time-zone=America/Lima

# --- Logging ---
logging.level.com.mibanco=INFO
logging.level.org.springframework.security=WARN
